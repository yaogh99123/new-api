name: Build new-api for macOS (Final Fix)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 环境准备
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      # 2. 前端编译（修复 Semi UI 路径报错）
      - name: Build Frontend
        run: |
          if [ -d "web" ]; then
            cd web
            # 使用 pnpm 并忽略依赖冲突
            pnpm install --no-frozen-lockfile
            
            # 关键修复：针对 Semi UI 的 CSS 引用路径不匹配问题进行强行替换
            # 将 ./dist/css/semi.css 替换为标准的包引用路径
            find . -type f \( -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" -o -name "*.css" \) -exec sed -i '' 's|@douyinfe/semi-ui/dist/css/semi.css|@douyinfe/semi-ui/dist/css/semi.min.css|g' {} + || true
            
            pnpm build
            cd ..
          fi

      # 3. 后端编译
      - name: Build Backend
        run: |
          # 静态编译，确保不依赖系统库
          export CGO_ENABLED=0
          # 编译 Apple Silicon 版本
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o new-api-macos-arm64
          # 编译 Intel
