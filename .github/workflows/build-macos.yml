name: Build new-api for macOS (Final Fix)

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        run: |
          VERSION=$(git describe --tags --always)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 1. 环境准备
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.25.1'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. 前端编译
      - name: Build Frontend
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          if [ -d "web" ]; then
            cd web
            bun install
            DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
            cd ..
          fi

      # 3. 后端编译
      - name: Build Backend
        run: |
          go mod download
          # 静态编译，确保不依赖系统库
          export CGO_ENABLED=0
          # 编译 Apple Silicon 版本
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION'" -o new-api-macos-arm64-$VERSION
          # 编译 Intel 版本
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION'" -o new-api-macos-amd64-$VERSION

      # 4. 打包配置文件和二进制文件
      - name: Package with Config Files
        run: |
          # 打包 Apple Silicon 版本
          mkdir -p pkg-arm64
          cp new-api-macos-arm64-$VERSION pkg-arm64/new-api
          cp .env.example pkg-arm64/
          cp new-api.service pkg-arm64/
          cp docker-compose.yml pkg-arm64/
          zip -r new-api-macos-arm64-$VERSION.zip pkg-arm64/

          # 打包 Intel 版本
          mkdir -p pkg-amd64
          cp new-api-macos-amd64-$VERSION pkg-amd64/new-api
          cp .env.example pkg-amd64/
          cp new-api.service pkg-amd64/
          cp docker-compose.yml pkg-amd64/
          zip -r new-api-macos-amd64-$VERSION.zip pkg-amd64/

      # 5. 上传产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: new-api-macos
          path: |
            new-api-macos-arm64-${{ env.VERSION }}.zip
            new-api-macos-amd64-${{ env.VERSION }}.zip

      # 6. 发布到 GitHub Release
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            new-api-macos-arm64-${{ env.VERSION }}.zip
            new-api-macos-amd64-${{ env.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
