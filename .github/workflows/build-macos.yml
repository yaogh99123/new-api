name: Build new-api for macOS (Final Fix)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 环境准备
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. 前端编译
      - name: Build Frontend
        run: |
          if [ -d "web" ]; then
            cd web
            bun install
            DISABLE_ESLINT_PLUGIN='true' bun run build
            cd ..
          fi

      # 3. 后端编译
      - name: Build Backend
        run: |
          # 静态编译，确保不依赖系统库
          export CGO_ENABLED=0
          # 编译 Apple Silicon 版本
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o new-api-macos-arm64
          # 编译 Intel
