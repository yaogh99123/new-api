name: Build new-api for macOS (Final Fix)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 环境准备
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 2. 前端编译
      - name: Build Frontend
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          if [ -d "web" ]; then
            cd web
            bun install
            DISABLE_ESLINT_PLUGIN='true' bun run build
            cd ..
          fi

      # 3. 后端编译
      - name: Build Backend
        run: |
          # 静态编译，确保不依赖系统库
          export CGO_ENABLED=0
          # 编译 Apple Silicon 版本
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o new-api-macos-arm64
          # 编译 Intel 版本
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o new-api-macos-amd64

      # 4. 打包配置文件和二进制文件
      - name: Package with Config Files
        run: |
          # 打包 Apple Silicon 版本
          mkdir -p pkg-arm64
          cp new-api-macos-arm64 pkg-arm64/new-api
          cp .env.example pkg-arm64/
          cp new-api.service pkg-arm64/
          cp docker-compose.yml pkg-arm64/
          zip -r new-api-macos-arm64.zip pkg-arm64/

          # 打包 Intel 版本
          mkdir -p pkg-amd64
          cp new-api-macos-amd64 pkg-amd64/new-api
          cp .env.example pkg-amd64/
          cp new-api.service pkg-amd64/
          cp docker-compose.yml pkg-amd64/
          zip -r new-api-macos-amd64.zip pkg-amd64/

      # 5. 上传产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: new-api-macos
          path: |
            new-api-macos-arm64.zip
            new-api-macos-amd64.zip
